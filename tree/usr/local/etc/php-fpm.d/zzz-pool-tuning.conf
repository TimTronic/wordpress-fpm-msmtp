; php-fpm pool defaults for the custom-wordpress base image.
;
; The stock php-fpm www.conf default pm.max_children = 5 is far too low: it lets
; WordPress loopback self-requests (Site Health / wp-cron / site-editor) plus
; normal concurrency starve the pool, producing 504/499 and "site down".
;
; Loaded after www.conf and zz-docker.conf (filename sorts last) so these [www]
; values win. This is a conservative SHARED default; a heavy site can mount a
; file over /usr/local/etc/php-fpm.d/zzz-pool-tuning.conf with higher values.
[www]
pm = dynamic
pm.max_children = 12
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
; hard-reclaim a worker stuck in blocking I/O (e.g. a hung loopback) after 120s
; so a few slow self-requests can never wedge the whole pool. Normal requests
; finish well under a second, so this only fires on genuine hangs.
request_terminate_timeout = 120s
